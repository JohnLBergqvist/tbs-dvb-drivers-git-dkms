PACKAGE_NAME="tbs-dvb-drivers-git-dkms"
PACKAGE_VERSION="@PKGVER@"

AUTOINSTALL="yes"

# Kernel range. Speculative 7.x support; primary deploy target is linux-lts (6.18.x).
# DKMS refuses to build outside this range with a clean error rather than a
# cryptic compile failure.
BUILD_EXCLUSIVE_KERNEL_VERSION="^[67]\."

MAKE[0]="make KERNELDIR=/lib/modules/${kernelver}/build"
CLEAN="make KERNELDIR=/lib/modules/${kernelver}/build clean"

# Patches in patches/*.patch are applied by our top-level Makefile's
# `patch` target, which runs as a prerequisite of `all`. We don't use
# DKMS's PATCH[i]/PATCH_MATCH[i] mechanism because those apply with
# `patch -p1` from the build root, but our patches reference paths
# under src/ — easier to handle in our own Makefile where we can cd
# into src/ first.

# Module list. Every TBS-added module produced by `make`. The DEST_MODULE_LOCATION
# is /extra by convention — DKMS overlays it on top of the kernel's own modules.
# This section is regenerated by sync-upstream.sh from src/Kbuild.
# BEGIN AUTO-GENERATED MODULE LIST
